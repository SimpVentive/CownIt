name: Deploy CownIt

on:
  push:
    branches:
      - main

concurrency:
  group: production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      # Build locally to ensure code compiles before deployment
      - name: Create Frontend .env
        working-directory: web
        run: |
          echo "VITE_API_URL=${{ secrets.VITE_API_URL }}" > .env

      - name: Install Frontend Dependencies
        working-directory: web
        run: bun install --frozen-lockfile

      - name: Build Frontend
        working-directory: web
        run: bun run build

      - name: Deploy to Server
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          password: ${{ secrets.PASSWORD }}
          port: ${{ secrets.PORT }}
          script_stop: true
          script: |
            export BUN_INSTALL="$HOME/.bun"
            export PATH="$BUN_INSTALL/bin:$PATH"

            cd /var/www/cownit.l-kurve.com/CownIt

            echo "Pulling latest code..."
            git fetch origin
            git reset --hard origin/main

            #############################
            ## Frontend
            #############################

            cd web

            cat > .env <<EOF
            VITE_API_URL=${{ secrets.VITE_API_URL }}
            EOF

            bun install --frozen-lockfile
            bun run build

            cd ..

            #############################
            ## Backend
            #############################

            cd server

            cat > .env <<EOF
            BACKENDPORT=${{ secrets.BACKENDPORT }}
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            DB_HOST=${{ secrets.DB_HOST }}
            DB_PORT=${{ secrets.DB_PORT }}
            DB_USER=${{ secrets.DB_USER }}
            DB_PASSWORD=${{ secrets.DB_PASSWORD }}
            DB_NAME=${{ secrets.DB_NAME }}
            EOF

            bun install --frozen-lockfile

            sudo systemctl restart cownit-server

            echo "Waiting for server..."
            sleep 5

            sudo systemctl status cownit-server --no-pager

            sudo systemctl reload apache2

            echo "Deployment completed successfully."
